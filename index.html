<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSTA - Campus Concepción</title>
    <style>
        /* RESETEO BÁSICO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .pantalla {
            display: none;
            height: 100vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Ahora la pantalla activa será la de Registro por defecto */
        .activa { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* PANTALLA DE REGISTRO (Ahora es la primera) */
        #pantalla-registro { 
            background-image: url('./FONDO.png'); 
            background-color: #003399; /* Respaldo azul */
        }

        /* PANTALLA DE MENÚ */
        #pantalla-menu { 
            background-image: url('./FONDO.png'); 
            background-color: #002266; /* Respaldo azul oscuro */
        }

        .contenedor-login {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h2 { color: #003399; margin-bottom: 20px; }

        input, select {
            width: 100%; 
            padding: 15px; 
            margin: 10px 0;
            font-size: 16px; 
            border-radius: 10px; 
            border: 1px solid #ccc;
            outline: none;
        }

        .btn-enviar {
            background: #003399; 
            color: white; 
            padding: 16px;
            width: 100%; 
            border: none; 
            border-radius: 10px;
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px;
            margin-top: 10px;
        }

        /* AJUSTES PARA CELULARES CHICOS */
        @media (max-height: 600px) {
            .contenedor-login { padding: 20px; }
            h2 { font-size: 1.2rem; }
            input, select { padding: 12px; }
        }
    </style>
</head>
<body>

    <!-- PANTALLA 1: REGISTRO (DATOS) -->
    <div id="pantalla-registro" class="pantalla activa">
        <div class="contenedor-login">
            <h2>Iniciá tu consulta</h2>
            <input type="number" id="dni" placeholder="Ingresá tu DNI" inputmode="numeric">
            <input type="tel" id="cel" placeholder="Número de Celular" inputmode="tel">
            <button class="btn-enviar" onclick="navegar('pantalla-menu')">Siguiente</button>
        </div>
    </div>

    <!-- PANTALLA 2: MENÚ (OPCIONES) -->
    <div id="pantalla-menu" class="pantalla">
        <div class="contenedor-login">
            <h2>¿Qué información buscás?</h2>
            <select id="opcion" onchange="finalizarRegistro()">
                <option value="">-- Seleccionar --</option>
                <option value="Carreras">Información de carreras</option>
                <option value="Inscripciones">Inscripciones</option>
                <option value="Cursos">Información de cursos</option>
                <option value="General">Consultas generales</option>
            </select>
        </div>
    </div>

    <script>
        // PEGA TU URL DE GOOGLE SHEETS AQUÍ
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwsjsdtNRaArrkEeKWD0KHuAVl1r0km4nLVIG9I6J2_ZwwpBnE3_BA0C6ClnL9RTG3Ksw/exec";

        function navegar(id) {
            // Quitamos la clase 'activa' de todas las pantallas
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            // Se la ponemos a la pantalla que queremos mostrar
            document.getElementById(id).classList.add('activa');
        }

        async function finalizarRegistro() {
            const sel = document.getElementById('opcion').value;
            if(!sel) return;

            const datos = {
                dni: document.getElementById('dni').value,
                celular: document.getElementById('cel').value,
                opcion: sel,
                fecha: new Date().toLocaleString()
            };

            alert("Registrando consulta...");

            // Envío a Google Sheets en modo no-cors para evitar bloqueos
            fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(datos)
            });

            // Recarga la página para el siguiente usuario después de un momento
            setTimeout(() => {
                location.reload();
            }, 800);
        }
    </script>
</body>
</html>
