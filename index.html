<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSTA - Campus Concepción</title>
    <style>
        /* RESETEO BÁSICO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
            background-color: #f0f0f0; /* Fondo neutral para la PC */
        }

        .pantalla {
            display: none;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        .activa { display: flex; flex-direction: column; align-items: center; }

        /* --- PANTALLA 1: INICIO (EL EQUILIBRIO PC/CELULAR) --- */
        #pantalla-inicio {
            /* Imagen por defecto para PC */
            background-image: url('./BIENVENIDO_3.png');
            background-size: contain; /* En PC la imagen se ve completa sin cortarse */
            background-position: center top;
            background-repeat: no-repeat;
        }

        .boton-invisible {
            position: absolute;
            /* Ajuste para PC */
            bottom: 15%; 
            width: 380px;
            height: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0); /* Cambiar a 0.3 para testear posición */
            border: none;
            cursor: pointer;
            border-radius: 50px;
            z-index: 10;
        }

        /* AJUSTES ESPECÍFICOS PARA CELULAR */
        @media (max-width: 600px) {
            #pantalla-inicio {
                /* Usamos tu imagen vertical que ya se ve bien */
                background-image: url('./BIENVENIDO_CELULAR.pgn');
                background-size: cover; 
                background-position: center center;
            }

            .boton-invisible {
                /* Ajuste para que calce en el botón de la imagen vertical */
                bottom: 8vh; 
                width: 80%;
                height: 12vh;
            }
        }

        /* --- ESTILOS DE FORMULARIOS --- */
        #pantalla-registro { 
            background-color: #003399; 
            justify-content: center; 
        }
        
        #pantalla-menu { 
            background-color: #002266; 
            justify-content: center; 
        }

        .contenedor-login {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h2 { color: #003399; margin-bottom: 20px; }

        input, select {
            width: 100%; 
            padding: 15px; 
            margin: 10px 0;
            font-size: 16px; 
            border-radius: 10px; 
            border: 1px solid #ccc;
        }

        .btn-enviar {
            background: #003399; 
            color: white; 
            padding: 16px;
            width: 100%; 
            border: none; 
            border-radius: 10px;
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- PANTALLA 1: BIENVENIDA -->
    <div id="pantalla-inicio" class="pantalla activa">
        <!-- Este es el botón que el usuario toca sobre la imagen -->
        <button class="boton-invisible" onclick="navegar('pantalla-registro')"></button>
    </div>

    <!-- PANTALLA 2: DATOS -->
    <div id="pantalla-registro" class="pantalla">
        <div class="contenedor-login">
            <h2>Datos de Contacto</h2>
            <input type="number" id="dni" placeholder="Ingresá tu DNI" inputmode="numeric">
            <input type="tel" id="cel" placeholder="Número de Celular" inputmode="tel">
            <button class="btn-enviar" onclick="navegar('pantalla-menu')">Siguiente</button>
        </div>
    </div>

    <!-- PANTALLA 3: MENÚ -->
    <div id="pantalla-menu" class="pantalla">
        <div class="contenedor-login">
            <h2>¿Qué información buscás?</h2>
            <select id="opcion" onchange="finalizarRegistro()">
                <option value="">-- Seleccionar --</option>
                <option value="Carreras">Información de carreras</option>
                <option value="Inscripciones">Inscripciones</option>
                <option value="Cursos">Información de cursos</option>
                <option value="General">Consultas generales</option>
            </select>
        </div>
    </div>

    <script>
        // REEMPLAZÁ CON TU URL DE GOOGLE SHEETS
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxlOKVuOveg8RmlyodhlROfx0RWPRWKbevZGYeyJBOI48KATjf7yDTNAzVLhFyx6SQX_w/exec"; 

        function navegar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        async function finalizarRegistro() {
            const sel = document.getElementById('opcion').value;
            if(!sel) return;

            const datos = {
                dni: document.getElementById('dni').value,
                celular: document.getElementById('cel').value,
                opcion: sel,
                fecha: new Date().toLocaleString()
            };

            alert("Registrando consulta...");

            // Envío a Google Sheets
            fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(datos)
            });

            // Reinicio de la terminal para el próximo usuario
            setTimeout(() => {
                location.reload();
            }, 500);
        }
    </script>
</body>
</html>
